spring:
  sql:
    init:
      schema-locations: classpath:schema-test.sql
      mode: always
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    hikari:
      connection-init-sql: "SET TIME ZONE 'UTC'"

logging:
  level:
    org.springframework.jdbc: DEBUG
    org.hibernate.SQL: DEBUG
    ua.foxminded.chyzhov.carrestservice: DEBUG