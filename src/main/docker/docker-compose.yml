services:
  postgres:
    image: postgres:17-alpine
    container_name: car-rest-service-db
    environment:
      POSTGRES_DB: cars
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: car-rest-service-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  app:
    build:
      # docker-compose.yml sits in src/main/docker/, but the Dockerfile is in
      # the repo root — this walks back up three levels to find it.
      context: ../../..
      dockerfile: Dockerfile
    container_name: car-rest-service-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cars
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/car-rest-service
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres_data:
