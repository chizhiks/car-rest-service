client-id: carRestServiceApplication
resource-url: http://localhost:8080/realms/car-rest-service/protocol/openid-connect/token
grant-type: password


spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/car_database
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    generate-ddl: false
    database: postgresql
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-staging.sql
      continue-on-error: false
  flyway:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: carRestServiceApplication
            authorization-grant-type: authorization_code
            scope: openid
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/car-rest-service
            user-name-attribute: preferred_username
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/car-rest-service

logging:
  level:
    root: WARN
    ua:
      foxminded:
        chyzhov:
          carrestservice: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE

server:
  port: 8000